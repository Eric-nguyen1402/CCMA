defaults:
  - _self_
  - dataset: cifar10
  - model: openclip_vit_B16
  - override hydra/hydra_logging: rich_logger
  - override hydra/job_logging: rich_logger

# no split, this writes a single group: "text"

# sweep over combinations of datasets and CLIP-like models
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      dataset: 
        aircraft,
        cars,
        cifar10,
        cifar100,
        domainnetreal,
        dtd,
        stl10,
        caltech101,
        caltech256,
        sun397,
        flowers,
        food101,
        imagenet100,
        pets,
        places365,
        svhn,
        amyloid_beta_bal,
        amyloid_beta_unbal,
        blood_smear,
        cell_cycle,
        colon_polyps,
        colorectal_histology,
        diabetic_retinopathy,
        ham10000,
        heart_failure,
        iicbu_hela,
        iicbu_lymphoma,
        malaria,
        pap_smear_2018,
        pap_smear_2019,
        patch_camelyon,
        pollen
      model:
        openclip_vit_B16,
        openclip_vit_L14,
        openclip_vit_H14,
        openclip_vit_g14,
        openclip_vit_G14,
        openai_vit_B16 

  run:
    dir: ""
  sweep:
    dir: /tmp/${oc.env:USER}/multirun
  job:
    chdir: false
  output_subdir: null
